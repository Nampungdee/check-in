 <!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ส่งรายงานเวร (ใบเขียว)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; background-color: #f0fdf4; }
    .green-gradient { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .input-field { border: 2px solid #bbf7d0; border-radius: 1rem; transition: all 0.3s; width: 100%; padding: 1rem; }
    .input-field:focus { border-color: #22c55e; outline: none; background-color: white; }
    .case-card { border-left: 5px solid #22c55e; background: white; margin-bottom: 1rem; padding: 1.5rem; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="pb-10">
  <div class="max-w-md mx-auto p-4">
    
    <div class="green-gradient rounded-3xl p-6 text-white text-center shadow-lg mb-6">
      <h1 class="text-xl font-bold uppercase">บันทึกรายงานเวร (ใบเขียว)</h1>
      <p class="text-green-100 text-xs opacity-90">Dept. of OB-GYN, Naresuan University</p>
    </div>

    <div class="bg-white rounded-3xl p-6 shadow-md mb-4 border border-green-50">
      <div class="grid grid-cols-2 gap-3 mb-4">
        <div>
          <label class="text-xs font-bold text-green-700 ml-1">ชื่อ-นามสกุล</label>
          <input type="text" id="name" class="input-field bg-gray-50 text-gray-500" readonly>
        </div>
        <div>
          <label class="text-xs font-bold text-green-700 ml-1">รหัสนิสิต</label>
          <input type="text" id="studentId" class="input-field bg-gray-50 text-gray-500" readonly>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs font-bold text-green-700 ml-1">วันที่ปฏิบัติงาน</label>
          <input type="date" id="workDate" class="input-field">
        </div>
        <div>
          <label class="text-xs font-bold text-green-700 ml-1">ช่วงเวลา</label>
          <select id="shiftTime" class="input-field">
            <option value="เวรนอกเวลา">เวรนอกเวลา</option>
            <option value="เวรเช้า">เวรเช้า</option>
            <option value="เวรบ่าย-ดึก">เวรบ่าย-ดึก</option>
          </select>
        </div>
      </div>
    </div>

    <div id="caseContainer">
      </div>

    <button onclick="addCase()" class="w-full border-2 border-dashed border-green-300 text-green-600 p-3 rounded-2xl mb-6 font-bold hover:bg-green-50">
      + เพิ่มเคส/รายการใหม่
    </button>

    <button onclick="submitAll()" class="w-full green-gradient text-white p-5 rounded-2xl font-bold text-xl shadow-xl hover:scale-[1.02] active:scale-95 transition-all">
      ส่งรายงานทั้งหมด
    </button>
  </div>

  <script src="Config.js"></script>
  <script>
    let caseCount = 0;

    window.onload = function() {
      // ดึงข้อมูลเดิม
      document.getElementById('name').value = localStorage.getItem('savedName') || "ไม่พบชื่อ";
      document.getElementById('studentId').value = localStorage.getItem('savedId') || "";
      document.getElementById('workDate').valueAsDate = new Date();
      addCase(); // เพิ่มเคสแรกให้อัตโนมัติ
    };

    function addCase() {
      caseCount++;
      const container = document.getElementById('caseContainer');
      const div = document.createElement('div');
      div.className = 'case-card';
      div.id = `case_${caseCount}`;
      div.innerHTML = `
        <div class="flex justify-between items-center mb-3">
          <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">เคสที่ ${caseCount}</span>
          ${caseCount > 1 ? `<button onclick="removeCase(${caseCount})" class="text-red-400 text-xs">ลบออก</button>` : ''}
        </div>
        <input type="text" placeholder="ชื่อผู้ป่วย/HN" class="input-field mb-3 case-patient">
        <input type="text" placeholder="Diagnosis (การวินิจฉัย)" class="input-field mb-3 case-diag">
        <textarea placeholder="กิจกรรมที่ทำ (P/A/O) / รายละเอียดงาน" rows="3" class="input-field case-note"></textarea>
      `;
      container.appendChild(div);
    }

    function removeCase(id) {
      document.getElementById(`case_${id}`).remove();
    }

    function submitAll() {
      const cases = [];
      const patientNodes = document.querySelectorAll('.case-patient');
      const diagNodes = document.querySelectorAll('.case-diag');
      const noteNodes = document.querySelectorAll('.case-note');

      for(let i=0; i<patientNodes.length; i++) {
        if(noteNodes[i].value) {
          cases.push({
            patient: patientNodes[i].value,
            diag: diagNodes[i].value,
            note: noteNodes[i].value
          });
        }
      }

      if(cases.length === 0) {
        Swal.fire('กรุณากรอกข้อมูล', 'อย่างน้อยต้องมี 1 รายการนะคะ', 'error');
        return;
      }

      Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

      const payload = {
        action: "submitReport",
        name: document.getElementById('name').value,
        id: document.getElementById('studentId').value,
        date: document.getElementById('workDate').value,
        shift: document.getElementById('shiftTime').value,
        cases: cases
      };

      fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) })
      .then(res => res.text())
      .then(response => {
        Swal.fire('สำเร็จ!', 'บันทึกรายงานเวรเรียบร้อยแล้วค่ะ', 'success').then(() => {
          window.location.reload();
        });
      })
      .catch(err => Swal.fire('เกิดข้อผิดพลาด', err.toString(), 'error'));
    }
  </script>
</body>
</html>
