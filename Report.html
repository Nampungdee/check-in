 <!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>แบบฟอร์มรายงานกิจกรรม (นสพ.ปี 5)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0fdfa; }
        .mint-bg { background-color: #2dd4bf; }
        .input-field { border: 2px solid #e2e8f0; border-radius: 16px; width: 100%; padding: 0.8rem; background: white; font-size: 16px; }
        .case-card { background: white; margin-bottom: 1rem; padding: 1.2rem; border-radius: 25px; border-left: 10px solid #2dd4bf; position: relative; }
        .label-text { font-size: 1rem; font-weight: 700; color: #134e4a; margin-bottom: 0.2rem; display: block; }
        .sig-page { display: none; }
        .sig-container { 
            position: relative; width: 100%; height: 250px; background: #fff; 
            border: 3px solid #99f6e4; border-radius: 25px; overflow: hidden; touch-action: none;
        }
        #signature-pad { width: 100%; height: 100%; }
        #signature-frozen-view {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: none; z-index: 20; object-fit: contain; pointer-events: none;
        }
        #video-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .step-indicator { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #cbd5e1; }
        .dot.active { background: #0d9488; width: 30px; border-radius: 10px; }
    </style>
</head>
<body class="p-4 pb-10">
    <div id="video-container">
        <video id="video" width="90%" autoplay playsinline class="rounded-3xl border-4 border-white mb-6"></video>
        <div class="flex gap-4">
            <button onclick="takePhoto()" class="bg-white text-gray-800 px-10 py-4 rounded-2xl font-bold text-lg">📸 สแกนหน้าออกให้เห็นชุดที่เปลี่ยนเรียบร้อยแล้ว</button>
        </div>
    </div>

    <div class="max-w-md mx-auto pt-4">
        <div class="step-indicator">
            <div id="dot1" class="dot active"></div>
            <div id="dot2" class="dot"></div>
        </div>

        <div id="step1">
            <div class="mint-bg rounded-[30px] p-6 text-white text-center shadow-md mb-6">
                <h1 class="text-xl font-bold">ส่วนที่ 1: ข้อมูลกิจกรรม</h1>
                <p class="text-xs opacity-90">ตรวจสอบชื่อและกรอกรายการเคส</p>
            </div>

            <div class="bg-white rounded-[25px] p-5 shadow-sm mb-4">
                <label class="label-text">ชื่อ นสพ.</label>
                <input type="text" id="name" class="input-field bg-gray-50 mb-3" readonly placeholder="ไม่พบข้อมูลชื่อ">
                <label class="label-text">รหัสประจำตัวนิสิต</label>
                <input type="text" id="studentId" class="input-field bg-gray-50 mb-3" readonly placeholder="ไม่พบข้อมูลรหัส">
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="label-text">วันที่</label><input type="date" id="workDate" class="input-field"></div>
                    <div><label class="label-text">เวลา</label><input type="text" id="shiftTime" class="input-field" placeholder="08:00-16:00"></div>
                </div>
            </div>

            <div id="caseContainer"></div>
            <button onclick="addCase()" class="w-full border-2 border-dashed border-[#2dd4bf] text-[#0d9488] py-4 rounded-2xl mb-6 font-bold bg-white">+ เพิ่มเคสคนไข้</button>
            <button onclick="goToStep2()" class="w-full bg-[#0d9488] text-white p-6 rounded-[30px] font-bold text-xl shadow-lg">ต่อไป: ให้อาจารย์ลงนาม ➜</button>
        </div>

        <div id="step2" class="sig-page">
            <div class="bg-orange-400 rounded-[30px] p-6 text-white text-center shadow-md mb-6">
