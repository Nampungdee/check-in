<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>บันทึกรายงานเวร นสพ.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Sarabun', sans-serif; padding: 10px; }
        .main-card { background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; max-width: 800px; margin: auto; }
        .header { background: #2e7d32; color: white; padding: 20px; text-align: center; }
        .case-row { background: #fff; border: 1px solid #dee2e6; border-radius: 10px; padding: 15px; margin-bottom: 15px; position: relative; }
        .case-number { background: #2e7d32; color: white; width: 30px; height: 30px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 10px; font-weight: bold; }
        .btn-add { background: #1976d2; color: white; margin-bottom: 20px; width: 100%; border-radius: 10px; padding: 12px; border: none; }
        .btn-submit { background: #2e7d32; color: white; width: 100%; padding: 18px; font-size: 1.2rem; border-radius: 10px; border: none; font-weight: bold; }
        .sig-box { background-color: #ffffff; border: 2px solid #2e7d32; border-radius: 10px; padding: 5px; margin-top: 20px; text-align: center; }
        .sig-container { position: relative; width: 100%; height: 250px; background-color: #fafafa; border-radius: 5px; margin-bottom: 10px; }
        canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; touch-action: none; }
        .remove-btn { position: absolute; top: 10px; right: 10px; color: #dc3545; cursor: pointer; border: 1px solid #dc3545; padding: 2px 8px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container main-card px-0 mb-5">
    <div class="header">
        <h4>รายงานกิจกรรมปฏิบัติงานนอกเวลา</h4>
        <h5>นสพ. ปีที่ 5 มหาวิทยาลัยนเรศวร</h5>
        <p class="mb-0">กลุ่มงานสูติ-นรีเวชกรรมและวางแผนครอบครัว</p>
    </div>
    
    <div class="p-3">
        <form id="multiForm">
            <div class="row mb-4">
                <div class="col-6 mb-2"><label class="form-label">วันที่ปฏิบัติงาน</label><input type="date" name="workDate" class="form-control" required></div>
                <div class="col-6 mb-2"><label class="form-label">ช่วงเวลา</label><input type="text" name="shiftTime" class="form-control" placeholder="08.30-24.00" required></div>
                <div class="col-6 mb-2"><label class="form-label">รหัสนิสิต</label><input type="text" id="studentId" name="studentId" class="form-control" required></div>
                <div class="col-6 mb-2"><label class="form-label">ชื่อ-นามสกุล นสพ.</label><input type="text" id="studentName" name="studentName" class="form-control" required></div>
            </div>

            <hr><h5 class="mb-3 text-success">รายการเคสผู้ป่วย</h5>
            <div id="caseContainer">
                <div class="case-row" id="case_1">
                    <div class="case-number">1</div>
                    <div class="row">
                        <div class="col-12 mb-2"><label class="form-label">ชื่อ-สกุล ผู้ป่วย</label><input type="text" name="patientName[]" class="form-control" required></div>
                        <div class="col-6 mb-2"><label class="form-label">วันที่รับ</label><input type="date" name="admitDate[]" class="form-control"></div>
                        <div class="col-6 mb-2"><label class="form-label">เวลา</label><input type="text" name="caseTime[]" class="form-control" placeholder="09:00"></div>
                        <div class="col-12 mb-2"><label class="form-label">Diagnosis</label><textarea name="diagnosis[]" class="form-control" rows="2"></textarea></div>
                        <div class="col-12"><label class="form-label">กิจกรรม</label><select name="activity[]" class="form-select"><option value="P">P</option><option value="A">A</option><option value="O">O</option></select></div>
                    </div>
                </div>
            </div>

            <button type="button" class="btn btn-add" onclick="addCase()">+ เพิ่มเคสถัดไป</button>

            <div class="sig-box">
                <label class="mb-2"><strong>ลายเซ็นอาจารย์ผู้ควบคุม</strong></label>
                <div class="sig-container"><canvas id="signature-pad"></canvas></div>
                <button type="button" class="btn btn-sm btn-outline-danger" onclick="clearSig()">ล้างลายเซ็น</button>
            </div>

            <button type="submit" class="btn btn-submit mt-4" id="submitBtn">ส่งรายงานทั้งหมด</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxgVG-Kw4J7lCaSl58zptyX0phXMQ3UvIduY7Z3cAS0MHE5B0vkIB6Ri_giUPWglEgW/exec";
    
    // ดึงข้อมูลจากความจำมือถือ (ถ้าเคยลงทะเบียนแล้ว)
    document.addEventListener('DOMContentLoaded', function() {
        const savedName = localStorage.getItem('nameId') || localStorage.getItem('userName');
        const savedId = localStorage.getItem('keynumberId') || localStorage.getItem('studentId');
        if(savedName) document.getElementById('studentName').value = savedName;
        if(savedId) document.getElementById('studentId').value = savedId;
        resizeCanvas();
    });

    const canvas = document.getElementById("signature-pad");
    const signaturePad = new SignaturePad(canvas, { minWidth: 1.5, maxWidth: 3.5 });

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        signaturePad.clear();
    }

    function addCase() {
        const container = document.getElementById('caseContainer');
        const num = container.getElementsByClassName('case-row').length + 1;
        const html = `<div class="case-row"><div class="remove-btn" onclick="removeCase(this)">ลบ✕</div><div class="case-number">${num}</div><div class="row"><div class="col-12 mb-2"><label>ชื่อผู้ป่วย</label><input type="text" name="patientName[]" class="form-control" required></div><div class="col-6 mb-2"><label>วันที่รับ</label><input type="date" name="admitDate[]" class="form-control"></div><div class="col-6 mb-2"><label>เวลา</label><input type="text" name="caseTime[]" class="form-control"></div><div class="col-12 mb-2"><label>Diagnosis</label><textarea name="diagnosis[]" class="form-control"></textarea></div><div class="col-12"><label>กิจกรรม</label><select name="activity[]" class="form-select"><option value="P">P</option><option value="A">A</option><option value="O">O</option></select></div></div></div>`;
        container.insertAdjacentHTML('beforeend', html);
        updateNumbers();
    }

    function removeCase(el) { el.parentElement.remove(); updateNumbers(); }
    function updateNumbers() { const rows = document.getElementsByClassName('case-number'); for(let i=0; i<rows.length; i++) rows[i].innerText = i+1; }
    function clearSig() { signaturePad.clear(); }

    document.getElementById('multiForm').onsubmit = function(e) {
        e.preventDefault();
        if (signaturePad.isEmpty()) { alert("กรุณาให้อาจารย์เซ็นชื่อก่อนค่ะ"); return; }
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "กำลังส่ง...";

        const formData = new FormData(this);
        const payload = {
            action: "submitReport",
            workDate: formData.get('workDate'),
            shiftTime: formData.get('shiftTime'),
            studentId: formData.get('studentId'),
            studentName: formData.get('studentName'),
            signature: signaturePad.toDataURL(),
            cases: []
        };

        const pNames = formData.getAll('patientName[]');
        const aDates = formData.getAll('admitDate[]');
        const cTimes = formData.getAll('caseTime[]');
        const diags = formData.getAll('diagnosis[]');
        const acts = formData.getAll('activity[]');

        for(let i=0; i<pNames.length; i++) {
            payload.cases.push({ no: i+1, pName: pNames[i], aDate: aDates[i], cTime: cTimes[i], diag: diags[i], act: acts[i] });
        }

        fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.text())
        .then(data => { alert("ส่งข้อมูลสำเร็จแล้วค่ะ!"); location.reload(); })
        .catch(err => { alert("เกิดข้อผิดพลาด: " + err); btn.disabled = false; });
    };
</script>
</body>
</html>
