<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>แบบฟอร์มรายงานกิจกรรม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0fdfa; touch-action: manipulation; }
        .mint-bg { background-color: #2dd4bf; }
        .input-field { border: 2px solid #e2e8f0; border-radius: 16px; width: 100%; padding: 0.8rem; background: white; font-size: 16px; }
        .case-card { background: white; margin-bottom: 1rem; padding: 1.2rem; border-radius: 25px; border-left: 10px solid #2dd4bf; position: relative; }
        .label-text { font-size: 1rem; font-weight: 700; color: #134e4a; margin-bottom: 0.2rem; display: block; }
        .sig-page { display: none; }
        .sig-container { position: relative; width: 100%; height: 250px; background: #fff; border: 3px solid #99f6e4; border-radius: 25px; overflow: hidden; touch-action: none; }
        #signature-pad { width: 100%; height: 100%; touch-action: none; }
        #signature-frozen-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; z-index: 20; object-fit: contain; pointer-events: none; }
    </style>
</head>
<body class="p-4 pb-10">
    <div id="step1">
        <div class="mint-bg rounded-[30px] p-6 text-white text-center mb-6 shadow-lg">
            <h1 class="text-xl font-bold">ข้อมูลรายงานกิจกรรม</h1>
        </div>
        <div class="bg-white rounded-[25px] p-5 shadow-sm mb-4">
            <label class="label-text">ชื่อ นสพ.</label>
            <input type="text" id="name" class="input-field mb-3" placeholder="พิมพ์ชื่อถ้าไม่ขึ้น">
            <label class="label-text">รหัสประจำตัวนิสิต</label>
            <input type="text" id="studentId" class="input-field mb-3" placeholder="พิมพ์รหัสถ้าไม่ขึ้น">
            <div class="grid grid-cols-2 gap-3">
                <div><label class="label-text">วันที่</label><input type="date" id="workDate" class="input-field"></div>
                <div><label class="label-text">เวลา</label><input type="text" id="shiftTime" class="input-field" placeholder="08:00-16:00"></div>
            </div>
        </div>
        <div id="caseContainer"></div>
        <button onclick="addCase()" class="w-full border-2 border-dashed border-[#2dd4bf] text-[#0d9488] py-4 rounded-2xl mb-6 font-bold bg-white">+ เพิ่มเคสคนไข้</button>
        <button onclick="goToStep2()" class="w-full bg-[#0d9488] text-white p-6 rounded-[30px] font-bold text-xl shadow-lg">ต่อไป: ให้อาจารย์ลงนาม ➜</button>
    </div>

    <div id="step2" class="sig-page">
        <div class="bg-orange-400 rounded-[30px] p-6 text-white text-center mb-6">
            <h1 class="text-xl font-bold">อาจารย์ลงนาม</h1>
        </div>
        <div class="bg-white rounded-[25px] p-6 shadow-sm mb-6">
            <div class="flex justify-between items-center mb-3">
                <label class="label-text m-0">ลายเซ็นอาจารย์</label>
                <button onclick="clearSig()" class="text-red-500 font-bold text-xs underline">ล้างจอ</button>
            </div>
            <div class="sig-container">
                <canvas id="signature-pad"></canvas>
                <img id="signature-frozen-view">
            </div>
            <div class="mt-6">
                <label class="label-text">ชื่ออาจารย์</label>
                <input type="text" id="staffName" class="input-field" placeholder="พิมพ์ชื่ออาจารย์">
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="goToStep1()" class="w-1/3 bg-gray-200 text-gray-600 p-5 rounded-[25px] font-bold">ย้อนกลับ</button>
            <button onclick="submitAll()" class="w-2/3 bg-[#0d9488] text-white p-5 rounded-[25px] font-bold text-lg shadow-lg">ส่งรายงาน ➜</button>
        </div>
    </div>

    <script>
        // แก้ไข: ใส่ URL ของ Google Apps Script ของคุณหมอตรงนี้ได้เลยครับ
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyVn65W7RAnDkQ_l_Xw_3XmR66D-8rZq5L6m8X7-A/exec"; 

        let sigPad, sigImg = "";

        window.onload = function() {
            // ระบบดึงข้อมูลจากเครื่อง
            document.getElementById('name').value = localStorage.getItem('savedName') || "";
            document.getElementById('studentId').value = localStorage.getItem('savedId') || "";
            document.getElementById('workDate').valueAsDate = new Date();
            
            initSignature();
            addCase(true);
        };

        function initSignature() {
            const canvas = document.getElementById("signature-pad");
            sigPad = new SignaturePad(canvas, {
                onEnd: () => {
                    sigImg = sigPad.toDataURL();
                    document.getElementById('signature-frozen-view').src = sigImg;
                    document.getElementById('signature-frozen-view').style.display = 'block';
                }
            });
            const resize = () => {
                const ratio = Math.max(window.devicePixelRatio || 1, 1);
                canvas.width = canvas.offsetWidth * ratio;
                canvas.height = canvas.offsetHeight * ratio;
                canvas.getContext("2d").scale(ratio, ratio);
            };
            window.addEventListener("resize", resize);
            resize();
        }

        function addCase(isFirst = false) {
            const container = document.getElementById('caseContainer');
            const div = document.createElement('div');
            div.className = 'case-card shadow-sm';
            const del = isFirst ? "" : `<button onclick="this.parentElement.remove()" class="absolute top-2 right-4 text-gray-300 text-2xl">×</button>`;
            div.innerHTML = `${del}<label class="label-text text-sm">HN ผู้ป่วย</label><input type="text" class="input-field p-in mb-2"><label class="label-text text-sm">Diagnosis</label><input type="text" class="input-field d-in mb-2"><label class="label-text text-sm">กิจกรรม</label><select class="input-field n-in font-bold"><option value="P">P</option><option value="A">A</option><option value="O">O</option></select>`;
            container.appendChild(div);
        }

        function clearSig() { sigPad.clear(); sigImg = ""; document.getElementById('signature-frozen-view').style.display = 'none'; }
        function goToStep1() { document.getElementById('step2').style.display = 'none'; document.getElementById('step1').style.display = 'block'; }
        function goToStep2() { document.getElementById('step1').style.display = 'none'; document.getElementById('step2').style.display = 'block'; window.scrollTo(0,0); }

        function submitAll() {
            const cases = Array.from(document.querySelectorAll('.case-card')).map(c => ({
                patient: c.querySelector('.p-in').value,
                diag: c.querySelector('.d-in').value,
                note: c.querySelector('.n-in').value
            }));

            if(!sigImg || !document.getElementById('staffName').value) {
                return Swal.fire('ข้อมูลไม่ครบ', 'กรุณาให้อาจารย์เซ็นชื่อและพิมพ์ชื่อด้วยครับ', 'warning');
            }

            Swal.fire({ title: 'กำลังส่งข้อมูล...', didOpen: () => Swal.showLoading() });
            
            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    action: "submitReport",
                    name: document.getElementById('name').value,
                    id: document.getElementById('studentId').value,
                    date: document.getElementById('workDate').value,
                    shift: document.getElementById('shiftTime').value,
                    signature: sigImg,
                    staffName: document.getElementById('staffName').value,
                    cases: cases
                })
            }).then(() => {
                Swal.fire('สำเร็จ!', 'บันทึกข้อมูลเรียบร้อยแล้วครับ', 'success').then(() => location.reload());
            }).catch(err => Swal.fire('เกิดข้อผิดพลาด', err.message, 'error'));
        }
    </script>
</body>
</html>
