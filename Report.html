<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ส่งรายงานเวร (ใบเขียว)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; background-color: #f0fdf4; color: #166534; }
    .green-gradient { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .input-field { border: 2px solid #bbf7d0; border-radius: 1rem; transition: all 0.3s; }
    .input-field:focus { border-color: #22c55e; ring: 0; outline: none; }
  </style>
</head>
<body class="pb-10">
  <div class="max-w-md mx-auto p-6">
    
    <div class="green-gradient rounded-3xl p-8 text-white text-center shadow-lg mb-6">
      <h1 class="text-2xl font-bold">บันทึกรายงานเวร</h1>
      <p class="text-green-100 text-sm opacity-90">Medical Student Daily Report</p>
      <div class="mt-4 text-3xl font-bold" id="displayTime">00:00</div>
    </div>

    <div class="bg-white rounded-3xl p-6 shadow-xl border border-green-100 space-y-5">
      
      <div>
        <label class="block text-sm font-semibold mb-1 ml-1">ชื่อ-นามสกุล นสพ.</label>
        <input type="text" id="name" class="input-field w-full p-4 bg-gray-50 text-gray-500 font-medium" readonly>
      </div>

      <div>
        <label class="block text-sm font-semibold mb-1 ml-1">รหัส นสพ.</label>
        <input type="text" id="studentId" class="input-field w-full p-4 bg-gray-50 text-gray-500 font-medium" readonly>
      </div>

      <div>
        <label class="block text-sm font-semibold mb-1 ml-1 text-green-700">รายละเอียดการปฏิบัติงาน/Case *</label>
        <textarea id="note" rows="5" class="input-field w-full p-4 placeholder-gray-300" placeholder="พิมพ์สรุปงานหรือเคสที่เจอวันนี้..."></textarea>
      </div>

      <button onclick="submitReport()" id="btnSubmit" class="w-full green-gradient text-white p-5 rounded-2xl font-bold text-lg shadow-lg hover:scale-[1.02] active:scale-95 transition-all">
        ส่งข้อมูล (ใบเขียว)
      </button>

      <button onclick="reRegister()" class="w-full text-gray-400 text-xs text-center mt-2 underline">
        ไม่ใช่ชื่อคุณ? คลิกเพื่อลงทะเบียนใหม่
      </button>

    </div>
  </div>

  <script src="Config.js"></script>
  <script>
    // 1. ดึงข้อมูลจากความจำเครื่อง (LocalStorage)
    window.onload = function() {
      const savedName = localStorage.getItem('savedName');
      const savedId = localStorage.getItem('savedId');

      if (!savedName || !savedId) {
        Swal.fire({
          icon: 'warning',
          title: 'ไม่พบข้อมูลการลงทะเบียน',
          text: 'กรุณาไปสแกนหน้าลงทะเบียนครั้งแรกก่อนนะคะ',
          confirmButtonText: 'ไปหน้าสแกนหน้า',
          confirmButtonColor: '#16a34a'
        }).then(() => {
          window.location.href = "index.html"; // แก้ชื่อไฟล์เป็นหน้าสแกนหน้าของคุณ
        });
      } else {
        document.getElementById('name').value = savedName;
        document.getElementById('studentId').value = savedId;
      }
      updateTime();
    };

    function updateTime() {
        const now = new Date();
        document.getElementById('displayTime').innerText = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(updateTime, 1000);

    // 2. ฟังก์ชันส่งข้อมูล
    function submitReport() {
      const note = document.getElementById('note').value;
      if (!note) {
        Swal.fire('กรุณากรอกรายละเอียด', 'อย่าลืมพิมพ์สรุปงานนะคะ', 'error');
        return;
      }

      Swal.fire({
        title: 'ยืนยันการส่ง?',
        text: "คุณต้องการส่งรายงานเวรใช่หรือไม่",
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#16a34a',
        confirmButtonText: 'ยืนยัน',
        cancelButtonText: 'ยกเลิก'
      }).then((result) => {
        if (result.isConfirmed) {
            
          Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

          // เตรียมข้อมูลส่งไปที่ Web App ตัวเดิมของคุณ
          const data = {
            action: "submitReport", // คุณต้องไปเพิ่มเคสนี้ใน Apps Script ด้วยนะคะ
            name: document.getElementById('name').value,
            id: document.getElementById('studentId').value,
            note: note,
            job: "ส่งเวร (ใบเขียว)",
            time: new Date().toLocaleString('th-TH')
          };

          fetch(WEB_APP_URL, { // ใช้ WEB_APP_URL จาก Config.js
            method: "POST",
            body: JSON.stringify(data)
          })
          .then(res => res.text())
          .then(response => {
            Swal.close();
            Swal.fire('สำเร็จ!', 'บันทึกรายงานเวรเรียบร้อยแล้วค่ะ', 'success').then(() => {
                document.getElementById('note').value = ""; // เคลียร์ช่องพิมพ์
            });
          })
          .catch(err => {
            Swal.close();
            Swal.fire('เกิดข้อผิดพลาด', 'กรุณาลองใหม่อีกครั้ง', 'error');
          });
        }
      });
    }

    function reRegister() {
        localStorage.clear();
        window.location.href = "index.html"; // แก้ชื่อไฟล์เป็นหน้าสแกนหน้าของคุณ
    }
  </script>
</body>
