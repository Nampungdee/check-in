 <!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>แบบฟอร์มรายงานกิจกรรม (นสพ.ปี 5)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #faf9f6; color: #1a1a1a; }
        .olive-bg { background-color: #84a59d; } 
        .btn-submit { background-color: #e07a5f; color: white; }
        .input-field { 
            border: 2px solid #bdc3c7; border-radius: 16px; width: 100%; padding: 1rem; 
            margin-bottom: 0.8rem; font-size: 1.2rem; font-weight: 500; outline: none; background-color: #ffffff;
        }
        .input-field:focus { border-color: #84a59d; box-shadow: 0 0 0 3px rgba(132, 165, 157, 0.2); }
        .case-card { 
            background: white; margin-bottom: 1.5rem; padding: 1.5rem; border-radius: 25px; 
            border: 2px solid #edf2f4; border-left: 10px solid #84a59d; position: relative;
        }
        .delete-btn { position: absolute; top: 15px; right: 15px; color: #d63031; font-size: 1.6rem; padding: 5px; }
        .label-text { font-size: 1.1rem; font-weight: 700; color: #2d3436; margin-bottom: 0.5rem; display: block; }
        
        /* สไตล์พิเศษสำหรับช่องเซ็นชื่อ */
        #signature-pad { border: 2px dashed #bdc3c7; border-radius: 20px; background-color: #f8f9fa; cursor: crosshair; touch-action: none; }
        #video-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="pb-20 px-4">

    <div id="video-container">
        <video id="video" width="90%" autoplay playsinline class="rounded-3xl border-4 border-white mb-6"></video>
        <div class="flex gap-4">
            <button onclick="takePhoto()" class="bg-white text-gray-800 px-10 py-4 rounded-2xl font-bold text-xl">📸 ถ่ายรูป</button>
            <button onclick="closeCamera()" class="bg-red-500 text-white px-8 py-4 rounded-2xl font-bold text-xl">ปิด</button>
        </div>
        <canvas id="photo-canvas" style="display:none;"></canvas>
    </div>

    <div class="max-w-md mx-auto pt-6">
        <div class="olive-bg rounded-[35px] p-8 text-white text-center shadow-lg mb-8">
            <h1 class="text-xl font-bold leading-tight">แบบ
