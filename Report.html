<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>แบบฟอร์มรายงานกิจกรรม (นสพ.ปี 5)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0fdfa; }
        .mint-bg { background-color: #2dd4bf; }
        .input-field { border: 2px solid #e2e8f0; border-radius: 16px; width: 100%; padding: 0.8rem; background: white; font-size: 16px; }
        .case-card { background: white; margin-bottom: 1rem; padding: 1.2rem; border-radius: 25px; border-left: 10px solid #2dd4bf; position: relative; }
        .label-text { font-size: 1rem; font-weight: 700; color: #134e4a; margin-bottom: 0.2rem; display: block; }
        
        /* สไตล์ช่องเซ็นชื่อแบบล็อกตายตัว */
        .sig-page { display: none; }
        .sig-container { 
            position: relative; width: 100%; height: 250px; background: #fff; 
            border: 3px solid #99f6e4; border-radius: 25px; overflow: hidden; touch-action: none;
        }
        #signature-pad { width: 100%; height: 100%; }
        
        /* เลเยอร์รูปภาพที่จะมาทับ Canvas ทันทีที่เซ็นเสร็จ */
        #signature-frozen-view {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: none; z-index: 20; object-fit: contain;
            pointer-events: none; /* เพื่อให้ยังกดล้างจอได้ */
        }

        #video-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .step-indicator { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #cbd5e1; }
        .dot.active { background: #0d9488; width: 30px; border-radius: 10px; }
    </style>
</head>
<body class="p-4 pb-10">
    <div id="video-container">
        <video id="video" width="90%" autoplay playsinline class="rounded-3xl border-4 border-white mb-6"></video>
        <div class="flex gap-4">
            <button onclick="takePhoto()" class="bg-white text-gray-800 px-10 py-4 rounded-2xl font-bold text-lg">📸 สแกนหน้าออกให้เห็นชุดที่เปลี่ยนเรียบร้อยแล้ว</button>
        </div>
    </div>

    <div class="max-w-md mx-auto pt-4">
        <div class="step-indicator">
            <div id="dot1" class="dot active"></div>
            <div id="dot2" class="dot"></div>
        </div>

        <div id="step1">
            <div class="mint-bg rounded-[30px] p-6 text-white text-center shadow-md mb-6">
                <h1 class="text-xl font-bold">ส่วนที่ 1: ข้อมูลกิจกรรม</h1>
                <p class="text-xs opacity-90">กรอกรายการเคสให้ครบถ้วน</p>
            </div>

            <div class="bg-white rounded-[25px] p-5 shadow-sm mb-4">
                <label class="label-text">ชื่อ นสพ.</label>
                <input type="text" id="name" class="input-field bg-gray-50 mb-3" readonly>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="label-text">วันที่</label><input type="date" id="workDate" class="input-field"></div>
                    <div><label class="label-text">เวลา</label><input type="text" id="shiftTime" class="input-field" placeholder="08:00-16:00"></div>
                </div>
            </div>

            <div id="caseContainer"></div>
            <button onclick="addCase()" class="w-full border-2 border-dashed border-[#2dd4bf] text-[#0d9488] py-4 rounded-2xl mb-6 font-bold bg-white">+ เพิ่มเคสคนไข้</button>
            <button onclick="goToStep2()" class="w-full bg-[#0d9488] text-white p-6 rounded-[30px] font-bold text-xl shadow-lg">ต่อไป: ให้อาจารย์ลงนาม ➜</button>
        </div>

        <div id="step2" class="sig-page">
            <div class="bg-orange-400 rounded-[30px] p-6 text-white text-center shadow-md mb-6">
                <h1 class="text-xl font-bold">ส่วนที่ 2: อาจารย์ลงนาม</h1>
                <p class="text-xs opacity-90">ยื่นมือถือให้อาจารย์เซ็นและพิมพ์ชื่อ</p>
            </div>

            <div class="bg-white rounded-[25px] p-6 shadow-sm mb-6 border-2 border-orange-100">
                <div class="flex justify-between items-center mb-3">
                    <label class="label-text m-0">ลายเซ็นอาจารย์</label>
                    <button onclick="clearAllSignature()" class="text-red-500 font-bold text-xs underline">ล้างจอ/เซ็นใหม่</button>
                </div>
                <div class="sig-container">
                    <canvas id="signature-pad"></canvas>
                    <img id="signature-frozen-view">
                </div>

                <div class="mt-6">
                    <label class="label-text">ชื่อ-นามสกุล อาจารย์ (ตัวบรรจง)</label>
                    <input type="text" id="staffName" class="input-field" placeholder="กรุณาพิมพ์ชื่ออาจารย์" oninput="checkStep2()">
                </div>
            </div>

            <button id="camera-btn" onclick="openCamera()" class="w-full bg-white text-[#0d9488] border-4 border-[#0d9488] p-5 rounded-[30px] font-bold text-lg mb-6 opacity-30 pointer-events-none">
                📸 สแกนหน้าออกให้เห็นชุดที่เปลี่ยนเรียบร้อยแล้ว🥼
            </button>

            <div id="preview-photo" class="hidden mb-6 mx-auto w-40 h-40 rounded-full border-4 border-white overflow-hidden shadow-lg bg-gray-200">
                <img id="face-img" src="" class="w-full h-full object-cover">
            </div>

            <div class="flex gap-3">
                <button onclick="goToStep1()" class="w-1/3 bg-gray-200 text-gray-600 p-5 rounded-[25px] font-bold">ย้อนกลับ</button>
                <button id="submit-btn" onclick="submitAll()" class="w-2/3 bg-[#0d9488] text-white p-5 rounded-[25px] font-bold text-lg opacity-30 pointer-events-none">ส่งรายงาน</button>
            </div>
        </div>
    </div>

    <script src="Config.js"></script>
    <script>
        let signaturePad, stream, faceBase64 = "", finalSigData = "";

        window.onload = function() {
            document.getElementById('name').value = localStorage.getItem('savedName') || "";
            document.getElementById('workDate').valueAsDate = new Date
