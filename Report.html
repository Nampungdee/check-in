 <!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ส่งรายงานเวร (ใบเขียว)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f7f9f7; color: #4a5d4a; }
        /* สีเขียวมินิมอล */
        .minimal-green { background-color: #a3b18a; } 
        .minimal-green-light { background-color: #dad7cd; }
        .btn-submit { background: linear-gradient(135deg, #a3b18a, #588157); }
        
        .input-field { border: 1.5px solid #dad7cd; border-radius: 12px; transition: all 0.3s; width: 100%; padding: 0.7rem; margin-bottom: 0.5rem; outline: none; background-color: #ffffff; }
        .input-field:focus { border-color: #a3b18a; box-shadow: 0 0 0 2px rgba(163, 177, 138, 0.2); }
        
        .case-card { background: white; margin-bottom: 1.2rem; padding: 1.2rem; border-radius: 20px; border: 1px solid #e9ede9; box-shadow: 0 4px 15px rgba(0,0,0,0.03); position: relative; }
        .delete-btn { position: absolute; top: 15px; right: 15px; color: #cca7a2; cursor: pointer; font-size: 1.1rem; transition: color 0.2s; }
        .delete-btn:hover { color: #e5989b; }
        
        canvas { touch-action: none; cursor: crosshair; }
        #video-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        
        .label-text { font-size: 0.75rem; font-weight: 500; color: #588157; margin-left: 0.2rem; margin-bottom: 0.2rem; display: block; }
    </style>
</head>
<body class="pb-10">
    <div id="video-container">
        <div class="bg-white p-4 rounded-3xl m-4 w-full max-w-sm text-center">
            <video id="video" width="100%" autoplay playsinline class="rounded-2xl mb-4"></video>
            <div class="flex gap-3 justify-center">
                <button onclick="takePhoto()" class="minimal-green text-white px-8 py-3 rounded-xl font-bold">📸 ถ่ายรูป</button>
                <button onclick="closeCamera()" class="bg-gray-100 text-gray-500 px-6 py-3 rounded-xl font-bold">ปิด</button>
            </div>
        </div>
        <canvas id="photo-canvas" style="display:none;"></canvas>
    </div>

    <div class="max-w-md mx-auto p-5">
        <div class="minimal-green rounded-[30px] p-7 text-white text-center shadow-sm mb-6">
            <h1 class="text-xl font-medium tracking-tight">รายงานเวร (ใบเขียว)</h1>
            <p class="text-xs opacity-80 mt-1 font-light tracking-widest uppercase">Department of OB-GYN</p>
        </div>

        <div class="bg-white rounded-[25px] p-6 shadow-sm mb-5 border border-white">
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div><span class="label-text">ชื่อ นสพ.</span><input type="text" id="name" class="input-field bg-gray-50" readonly></div>
                <div><span class="label-text">รหัส</span><input type="text" id="studentId" class="input-field bg-gray-50" readonly></div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div><span class="label-text">วันที่ปฏิบัติงาน</span><input type="date" id="workDate" class="input-field text-sm"></div>
                <div><span class="label-text">ช่วงเวลา (เช่น 08:00-16:30)</span><input type="text" id="shiftTime" class="input-field text-sm" placeholder="..."></div>
            </div>
        </div>

        <div id="caseContainer"></div>
        
        <button onclick="addCase()" class="w-full border-2 border-dashed border-[#dad7cd] text-[#a3b18a] p-3 rounded-2xl mb-8 font-medium hover:bg-white transition-all">
            <i class="fas fa-plus-circle mr-1"></i> เพิ่มรายการใหม่
        </button>

        <div class="bg-white rounded-[25px] p-6 shadow-sm mb-5 border border-white text-center">
            <label class="label-text mb-2 text-center">อาจารย์ผู้ควบคุมลงนาม</label>
            <div class="bg-gray-50 rounded-2xl border border-dashed border-[#dad7cd] overflow-hidden">
                <canvas id="signature-pad" class="w-full h-32"></canvas>
            </div>
            <button type="button" onclick="signaturePad.clear()" class="text-[10px] text-gray-400 mt-2 hover:text-red-400 transition-colors">ล้างลายเซ็น</button>
        </div>

        <div class="mb-8 text-center">
            <div id="preview-photo" class="hidden mb-4 mx-auto w-36 h-36 rounded-full border-4 border-white shadow-md overflow-hidden bg-gray-100">
                <img id="face-img" src="" class="w-full h-full object-cover">
            </div>
            <button id="camera-btn" onclick="openCamera()" class="w-full bg-white text-[#588157] border border-[#dad7cd] p-4 rounded-2xl font-medium shadow-sm active:scale-95 transition-all">
                <i class="fas fa-camera mr-2"></i> สแกนหน้ายืนยันตัวตน
            </button>
        </div>

        <button onclick="submitAll()" class="w-full btn-submit text-white p-5 rounded-[22px] font-medium text-lg shadow-lg active:scale-95 transition-all">ส่งบันทึกรายงาน</button>
    </div>

    <script src="Config.js"></script>
    <script>
        let signaturePad, stream, faceBase64 = "";
        let caseCount = 0;

        window.onload = () => {
            document.getElementById('name').value = localStorage.getItem('savedName') || "";
            document.getElementById('studentId').value = localStorage.getItem('savedId') || "";
            document.getElementById('workDate').valueAsDate = new Date();
            const canvas = document.getElementById('signature-pad');
            const resizeCanvas = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
            resizeCanvas();
            signaturePad = new SignaturePad(canvas);
            addCase(true); 
        };

        function addCase(isFirst = false) {
            caseCount++;
            const container = document.getElementById('caseContainer');
            const div = document.createElement('div');
            div.className = 'case-card';
            const deleteHtml = isFirst ? "" : `<div class="delete-btn" onclick="this.parentElement.remove()"><i class="fas fa-trash-alt"></i></div>`;
            
            div.innerHTML = `
                ${deleteHtml}
                <div class="text-[10px] font-bold text-[#a3b18a] mb-2 uppercase tracking-widest">Case #${caseCount}</div>
                <span class="label-text">ชื่อผู้ป่วย / HN</span>
                <input type="text" placeholder="..." class="input-field case-patient">
                
                <span class="label-text">โรคที่ได้รับการวินิจฉัย (Diagnosis)</span>
                <textarea placeholder="..." rows="3" class="input-field case-diag py-3"></textarea>
                
                <span class="label-text">กิจกรรมที่ปฏิบัติ</span>
                <select class="input-field case-note text-sm">
                    <option value="">-- เลือกกิจกรรม --</option>
                    <option value="Observing (เฝ้าสังเกตการณ์)">Observing (เฝ้าสังเกตการณ์)</option>
                    <option value="Assisting (ช่วยหัตถการ/ผ่าตัด)">Assisting (ช่วยหัตถการ/ผ่าตัด)</option>
                    <option value="Performing (ทำหัตถการเอง)">Performing (ทำหัตถการเอง)</option>
                    <option value="Case Presentation (นำเสนอเคส)">Case Presentation (นำเสนอเคส)</option>
                    <option value="Counseling (ให้คำปรึกษา)">Counseling (ให้คำปรึกษา)</option>
                </select>
            `;
            container.appendChild(div);
        }

        async function openCamera() {
            try {
                document.getElementById('video-container').style.display = 'flex';
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('video').srcObject = stream;
            } catch (err) {
                Swal.fire('เข้าถึงกล้องไม่ได้', 'กรุณาอนุญาตการเข้าถึงกล้องนะคะ', 'error');
                document.getElementById('video-container').style.display = 'none';
            }
        }

        function closeCamera() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('video-container').style.display = 'none';
        }

        function takePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('photo-canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            faceBase64 = canvas.toDataURL('image/jpeg', 0.6);
            document.getElementById('face-img').src = faceBase64;
            document.getElementById('preview-photo').classList.remove('hidden');
            document.getElementById('camera-btn').innerHTML = `<i class="fas fa-check-circle mr-2"></i> สแกนหน้าสำเร็จ (ถ่ายใหม่กดที่นี่)`;
            closeCamera();
        }

        async function submitAll() {
            const cases = Array.from(document.querySelectorAll('.case-patient')).map((el, i) => ({
                patient: el.value,
                diag: document.querySelectorAll('.case-diag')[i].value,
                note: document.querySelectorAll('.case-note')[i].value
            })).filter(c => c.note !== "");

            if (cases.length === 0) return Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกกิจกรรมอย่างน้อย 1 เคสค่ะ', 'warning');
            if (signaturePad.isEmpty()) return Swal.fire('ขาดลายเซ็น', 'อาจารย์ยังไม่ได้ลงนามค่ะ', 'warning');
            if (!faceBase64) return Swal.fire('ยังไม่ได้สแกนหน้า', 'กรุณาสแกนหน้าเพื่อยืนยันการเช็คเอาท์ค่ะ', 'warning');

            Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const payload = {
                action: "submitReport",
                name: document.getElementById('name').value,
                id: document.getElementById('studentId').value,
                date: document.getElementById('workDate').value,
                shift: document.getElementById('shiftTime').value,
                signature: signaturePad.toDataURL(),
                faceImage: faceBase64,
                cases: cases
            };

            fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) })
            .then(() => Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: 'บันทึกเรียบร้อยแล้วค่ะ', timer: 2000 }).then(() => location.reload()))
            .catch(err => Swal.fire('ผิดพลาด', 'ลองส่งใหม่อีกครั้งนะคะ', 'error'));
        }
    </script>
</body>
</html>
