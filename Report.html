 <!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>แบบฟอร์มรายงานกิจกรรม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0fdfa; touch-action: manipulation; }
        .mint-bg { background-color: #2dd4bf; }
        .input-field { border: 2px solid #e2e8f0; border-radius: 16px; width: 100%; padding: 0.8rem; background: white; font-size: 16px; }
        .case-card { background: white; margin-bottom: 1rem; padding: 1.2rem; border-radius: 25px; border-left: 10px solid #2dd4bf; position: relative; }
        .label-text { font-size: 1rem; font-weight: 700; color: #134e4a; margin-bottom: 0.2rem; display: block; }
        .sig-page { display: none; }
        .sig-container { position: relative; width: 100%; height: 200px; background: #fff; border: 3px solid #99f6e4; border-radius: 25px; overflow: hidden; touch-action: none; }
        #signature-pad { width: 100%; height: 100%; touch-action: none; }
        #signature-frozen-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; z-index: 20; object-fit: contain; pointer-events: none; }
        #video-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .max-w-md { max-width: 480px !important; margin: auto; }
        #preview-photo { width: 100px; height: 100px; flex-shrink: 0; margin: 10px auto; }
    </style>
</head>
<body class="p-4 pb-20">
    <div id="video-container">
        <video id="video" width="85%" autoplay playsinline style="border-radius: 25px; border: 4px solid white;"></video>
        <button onclick="takePhoto()" class="mt-5 bg-white text-gray-800 px-8 py-3 rounded-2xl font-bold text-lg shadow-xl">📸 ถ่ายรูปยืนยันตัวตน</button>
    </div>

    <div class="max-w-md mx-auto pt-4">
        <div id="step1">
            <div class="mint-bg rounded-[30px] p-5 text-white text-center mb-6 shadow-lg">
                <h1 class="text-base font-bold leading-tight">รายงานกิจกรรมปฏิบัติงานนอกเวลา นศพ.ปี 5 มน.</h1>
            </div>
            <div class="bg-white rounded-[25px] p-5 shadow-sm mb-4">
                <label class="label-text">ชื่อ นสพ.</label>
                <input type="text" id="name" class="input-field mb-3" placeholder="ชื่อ-นามสกุล">
                <label class="label-text">รหัสนิสิต</label>
                <input type="text" id="studentId" class="input-field mb-3" placeholder="รหัสนิสิต">
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="label-text">วันที่</label><input type="date" id="workDate" class="input-field"></div>
                    <div><label class="label-text">เวลา</label><input type="text" id="shiftTime" class="input-field" placeholder="08:00-16:00"></div>
                </div>
            </div>
            <div id="caseContainer"></div>
            <button onclick="addCase()" class="w-full border-2 border-dashed border-[#2dd4bf] text-[#0d9488] py-3 rounded-2xl mb-6 font-bold bg-white">+ เพิ่มเคส</button>
            <button onclick="goToStep2()" class="w-full bg-[#0d9488] text-white p-5 rounded-[30px] font-bold text-lg shadow-lg">ต่อไป: อาจารย์ลงนาม ➜</button>
        </div>

        <div id="step2" class="sig-page">
            <div class="bg-orange-400 rounded-[30px] p-5 text-white text-center mb-4 shadow-lg"><h1 class="text-lg font-bold">อาจารย์ลงนาม</h1></div>
            <div class="bg-white rounded-[25px] p-5 shadow-sm mb-4 border-2 border-orange-100">
                <div class="flex justify-between items-center mb-2">
                    <label class="label-text m-0">ลายเซ็นอาจารย์</label>
                    <button onclick="clearSig()" class="text-red-500 font-bold text-xs underline">ล้างจอ</button>
                </div>
                <div class="sig-container"><canvas id="signature-pad"></canvas><img id="signature-frozen-view"></div>
                <div class="mt-4">
                    <label class="label-text">ชื่ออาจารย์</label>
                    <input type="text" id="staffName" class="input-field" placeholder="พิมพ์ชื่ออาจารย์">
                </div>
            </div>
            <button id="cam-btn" onclick="openCamera()" class="w-full bg-white text-[#0d9488] border-4 border-[#0d9488] p-3 rounded-[30px] font-bold text-base mb-4 opacity-30 pointer-events-none">📸 สแกนหน้าออกเวร</button>
            <div id="preview-photo" class="hidden rounded-full border-4 border-white overflow-hidden shadow-lg"><img id="face-img" src="" class="w-full h-full object-cover"></div>
            <div class="flex gap-3 pb-10">
                <button onclick="goToStep1()" class="w-1/3 bg-gray-200 p-4 rounded-[25px] font-bold">ย้อนกลับ</button>
                <button onclick="submitAll()" class="w-2/3 bg-[#0d9488] text-white p-4 rounded-[25px] font-bold text-lg shadow-lg">ส่งรายงาน ➜</button>
            </div>
        </div>
    </div>

    <script src="Config.js"></script>
    <script>
        let sigPad, stream, faceImg = "", sigImg = "";

        document.addEventListener('DOMContentLoaded', function() {
            // ดึงข้อมูลแบบครอบคลุมทั้งตัวแปรเก่าและใหม่
            const name = localStorage.getItem('savedName') || localStorage.getItem('name');
            const id = localStorage.getItem('savedId') || localStorage.getItem('studentId');
            
            if (name) document.getElementById('name').value = name;
            if (id) document.getElementById('studentId').value = id;
            
            document.getElementById('workDate').valueAsDate = new Date();

            // ระบบบันทึกข้อมูลทันทีที่พิมพ์ (ช่วยให้ Chrome ไม่ลืม)
            document.getElementById('name').addEventListener('input', (e) => {
                localStorage.setItem('name', e.target.value);
                localStorage.setItem('savedName', e.target.value);
            });
            document.getElementById('studentId').addEventListener('input', (e) => {
                localStorage.setItem('studentId', e.target.value);
                localStorage.setItem('savedId', e.target.value);
            });

            initSignature();
            addCase(true);
        });

        function checkNext() {
            const hasStaffName = document.getElementById('staffName').value.trim().length >= 2;
            const camBtn = document.getElementById('cam-btn');
            if (hasStaffName && sigImg) {
                camBtn.classList.remove('opacity-30', 'pointer-events-none');
            } else {
                camBtn.classList.add('opacity-30', 'pointer-events-none');
            }
        }

        function initSignature() {
            const canvas = document.getElementById("signature-pad");
            sigPad = new SignaturePad(canvas, { backgroundColor: 'rgba(255,255,255,0)', penColor: 'rgb(0,0,0)' });
            sigPad.addEventListener("endStroke", () => {
                sigImg = sigPad.toDataURL();
                document.getElementById('signature-frozen-view').src = sigImg;
                document.getElementById('signature-frozen-view').style.display = 'block';
                checkNext();
            });
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
        }

        document.getElementById('staffName').addEventListener('input', checkNext);

        async function openCamera() {
            try {
                document.getElementById('video-container').style.display = 'flex';
                stream = await navigator.mediaDevices.getUserMedia
