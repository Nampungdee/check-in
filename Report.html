 <!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ส่งรายงานเวร (ใบเขียว)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0fdf4; }
        .green-gradient { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .input-field { border: 2px solid #bbf7d0; border-radius: 1rem; transition: all 0.3s; width: 100%; padding: 0.8rem; margin-bottom: 0.5rem; }
        .case-card { border-left: 5px solid #22c55e; background: white; margin-bottom: 1rem; padding: 1rem; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        canvas { touch-action: none; cursor: crosshair; }
    </style>
</head>
<body class="pb-10">
    <div class="max-w-md mx-auto p-4">
        <div class="green-gradient rounded-3xl p-6 text-white text-center shadow-lg mb-6">
            <h1 class="text-xl font-bold">บันทึกรายงานเวร (ใบเขียว)</h1>
            <p class="text-green-100 text-xs">Medical Student Daily Report</p>
        </div>

        <div class="bg-white rounded-3xl p-6 shadow-md mb-4 border border-green-50 text-sm">
            <div class="grid grid-cols-2 gap-3 mb-2">
                <div><label class="font-bold text-green-700">ชื่อ นสพ.</label><input type="text" id="name" class="input-field bg-gray-50" readonly></div>
                <div><label class="font-bold text-green-700">รหัส นสพ.</label><input type="text" id="studentId" class="input-field bg-gray-50" readonly></div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div><label class="font-bold text-green-700">วันที่</label><input type="date" id="workDate" class="input-field"></div>
                <div><label class="font-bold text-green-700">เวลา (เช่น 08.00-00.00)</label><input type="text" id="shiftTime" class="input-field" placeholder="ระบุเวลาเอง"></div>
            </div>
        </div>

        <div id="caseContainer"></div>
        <button onclick="addCase()" class="w-full border-2 border-dashed border-green-300 text-green-600 p-3 rounded-2xl mb-6 font-bold">+ เพิ่มเคสใหม่</button>

        <div class="bg-white rounded-3xl p-6 shadow-md mb-6 border border-green-50 text-center">
            <label class="text-xs font-bold text-green-700 mb-2 block">อาจารย์ผู้ควบคุมลงนาม</label>
            <canvas id="signature-pad" class="border-2 border-dashed border-green-100 rounded-2xl w-full h-40 bg-gray-50"></canvas>
            <button type="button" onclick="signaturePad.clear()" class="text-xs text-red-400 mt-2 underline">ล้างลายเซ็น</button>
        </div>

        <button onclick="submitAll()" class="w-full green-gradient text-white p-5 rounded-2xl font-bold text-xl shadow-xl active:scale-95 transition-all">ส่งรายงานทั้งหมด</button>
    </div>

    <script src="Config.js"></script>
    <script>
        let signaturePad;
        window.onload = () => {
            document.getElementById('name').value = localStorage.getItem('savedName') || "";
            document.getElementById('studentId').value = localStorage.getItem('savedId') || "";
            document.getElementById('workDate').valueAsDate = new Date();
            const canvas = document.getElementById('signature-pad');
            function resizeCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
            window.addEventListener("resize", resizeCanvas);
            resizeCanvas();
            signaturePad = new SignaturePad(canvas);
            addCase();
        };

        function addCase() {
            const container = document.getElementById('caseContainer');
            const div = document.createElement('div');
            div.className = 'case-card';
            div.innerHTML = `
                <input type="text" placeholder="ชื่อผู้ป่วย/HN" class="input-field case-patient">
                <input type="text" placeholder="Diagnosis" class="input-field case-diag">
                <textarea placeholder="กิจกรรม (P/A/O)" rows="2" class="input-field case-note"></textarea>
            `;
            container.appendChild(div);
        }

        async function submitAll() {
            const cases = Array.from(document.querySelectorAll('.case-patient')).map((el, i) => ({
                patient: el.value,
                diag: document.querySelectorAll('.case-diag')[i].value,
                note: document.querySelectorAll('.case-note')[i].value
            })).filter(c => c.note);

            if (cases.length === 0 || signaturePad.isEmpty()) {
                return Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกกิจกรรมและให้อาจารย์เซ็นชื่อนะคะ', 'warning');
            }

            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const payload = {
                action: "submitReport",
                name: document.getElementById('name').value,
                id: document.getElementById('studentId').value,
                date: document.getElementById('workDate').value,
                shift: document.getElementById('shiftTime').value,
                signature: signaturePad.toDataURL(),
                cases: cases
            };

            fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) })
            .then(res => res.text())
            .then(() => Swal.fire('สำเร็จ!', 'บันทึกรายงานแล้วค่ะ', 'success').then(() => location.reload()))
            .catch(err => Swal.fire('ผิดพลาด', err.toString(), 'error'));
        }
    </script>
</body>
</html>
