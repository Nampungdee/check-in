 <div class="bg-white rounded-3xl p-6 shadow-md mb-4 border border-green-50">
  <div class="grid grid-cols-2 gap-3 mb-4">
    <div>
      <label class="text-xs font-bold text-green-700 ml-1">ชื่อ-นามสกุล</label>
      <input type="text" id="name" class="input-field bg-gray-50 text-gray-500" readonly>
    </div>
    <div>
      <label class="text-xs font-bold text-green-700 ml-1">รหัสนิสิต</label>
      <input type="text" id="studentId" class="input-field bg-gray-50 text-gray-500" readonly>
    </div>
  </div>
  <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="text-xs font-bold text-green-700 ml-1">วันที่ปฏิบัติงาน</label>
      <input type="date" id="workDate" class="input-field">
    </div>
    <div>
      <label class="text-xs font-bold text-green-700 ml-1">ช่วงเวลา (ระบุเอง)</label>
      <input type="text" id="shiftTime" class="input-field" placeholder="เช่น 08.00-00.00">
    </div>
  </div>
</div>

<div class="bg-white rounded-3xl p-6 shadow-md mb-6 border border-green-50 text-center">
  <label class="text-xs font-bold text-green-700 mb-2 block">ลายเซ็นอาจารย์ผู้ควบคุม</label>
  <canvas id="signature-pad" class="border-2 border-dashed border-green-200 rounded-2xl w-full h-40 bg-gray-50"></canvas>
  <button type="button" onclick="clearSignature()" class="text-xs text-red-400 mt-2 underline">ล้างลายเซ็น</button>
</div>
