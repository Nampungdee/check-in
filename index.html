<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>บันทึกการเข้างาน</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>

  <style>
    body {
      font-family: 'Kanit', sans-serif;
      background: linear-gradient(to bottom right, #fff, #ffe6f0, #ffd6eb);
      color: #333;
    }

    /* การ์ดพื้นหลัง */
    .bg-slate-100 {
      background: #fff0f6 !important;
    }

    /* ปุ่มหลัก */
    button {
      transition: all 0.3s ease;
      border-radius: 1rem !important;
      font-weight: 600;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(255, 182, 193, 0.3);
    }

    /* ปุ่มหลักสีชมพู */
    .bg-slate-800 {
      background: linear-gradient(135deg, #ff85a2, #ffb6c1) !important;
      color: white !important;
    }

    /* ปุ่มถ่ายรูป */
    .bg-green-500 {
      background: linear-gradient(135deg, #ffb6c1, #ffcce0) !important;
      color: #fff !important;
    }

    /* ปุ่มรอง */
    .bg-gray-300 {
      background: #ffe6f0 !important;
      color: #555 !important;
    }

    /* input */
    input, textarea {
      border-radius: 1rem !important;
      border: 2px solid #ffb6c1 !important;
      background: #fff !important;
    }

    label {
      color: #ff4d88 !important;
      font-weight: 600;
    }

    /* ข้อความหัวข้อ */
    h2, .text-5xl, .font-bold {
      color: #ff4d88 !important;
    }
  </style>
</head>

<body class="bg-white h-screen">
  <div class="max-w-md mx-auto p-6">
    
    <div class="bg-slate-800 border rounded-lg text-white text-center mb-4 py-8 px-4">
      <div class="daytime">
        <div id="date" class="text-sm opacity-90 mb-1"></div>
        <div class="text-5xl font-bold" id="time"></div>
        <input type="date" id="todayInput" name="todayInput" class="hidden" />
        <input type="time" id="currentTime" name="currentTime" class="hidden" />
      </div>
    </div>

    <div id="step1">
      <div class="relative bg-slate-100 p-4 rounded-lg space-y-4">
        <div id="loadingOverlay" class="hidden absolute top-0 left-0 w-full h-full bg-white/80 flex items-center justify-center z-[1000] rounded-lg">
          <div class="text-center text-gray-800 font-semibold">ค้นหารายชื่อ..</div>
        </div>
        
        <div class="relative pt-2">
          <label for="columnBData" class="absolute top-0 left-3 text-xs bg-slate-100 px-1 font-semibold">ชื่อ-นามสกุล</label>
          <input type="text" class="w-full px-4 py-3 text-sm border-2 rounded-xl" id="columnBData" name="columnBData" required />
        </div>

        <div class="relative pt-2">
          <label for="columnCData" class="absolute top-0 left-3 text-xs bg-slate-100 px-1 font-semibold">รหัส นสพ.</label>
          <input type="text" class="w-full px-4 py-3 text-sm border-2 rounded-xl" id="columnCData" name="columnCData" required />
        </div>

        <div class="relative pt-2">
          <label for="columnDData" class="absolute top-0 left-3 text-xs bg-slate-100 px-1 font-semibold">ชั้นปี</label>
          <input type="text" class="w-full px-4 py-3 text-sm border-2 rounded-xl" id="columnDData" name="columnDData" required />
        </div>

        <input type="hidden" id="userId" name="userId" />
        <input type="hidden" id="columnAData" name="columnAData" />
      </div>

      <input type="hidden" id="jobInput" name="jobInput" required />
      <textarea class="w-full border border-gray-300 rounded-lg p-4 text-gray-700 mt-4" placeholder="หมายเหตุ (ถ้ามี)" id="noteInput"></textarea>
      
      <div class="bg-slate-800 text-white text-center rounded-lg my-4">
        <button type="button" class="p-4 w-full" onclick="nextStep()">ถัดไป</button>
      </div>
    </div>

    <div id="step2" class="hidden text-center">
      <div class="photo pb-4">
        <div class="flex justify-center mb-4">
          <video id="camera-preview" width="70%" height="auto" autoplay playsinline poster="https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/No-Image-Placeholder.svg/330px-No-Image-Placeholder.svg.png" class="rounded-lg"></video>
        </div>
        <div class="flex justify-center mb-4">
          <img id="preview" width="70%" height="auto" alt="" class="rounded-lg hidden" />
        </div>
        
        <div class="flex justify-center space-x-2 my-4 px-4">
          <button type="button" class="w-full text-xs py-3 px-2 rounded-lg bg-[#001D53] text-white" id="start-camera-btn">เปิดกล้อง</button>
          <button type="button" class="w-full text-xs py-3 px-2 rounded-lg bg-green-500 text-white" id="capture-btn" disabled>ถ่ายรูป</button>
          <button type="button" id="switch-camera-btn" class="py-3 px-4 rounded-lg bg-slate-100 text-black border border-gray-200" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" color="#000000" fill="none">
              <path d="M15.1667 0.999756L15.7646 2.11753C16.1689 2.87322 16.371 3.25107 16.2374 3.41289C16.1037 3.57471 15.6635 3.44402 14.7831 3.18264C13.9029 2.92131 12.9684 2.78071 12 2.78071C6.75329 2.78071 2.5 6.90822 2.5 11.9998C2.5 13.6789 2.96262 15.2533 3.77093 16.6093M8.83333 22.9998L8.23536 21.882C7.83108 21.1263 7.62894 20.7484 7.7626 20.5866C7.89627 20.4248 8.33649 20.5555 9.21689 20.8169C10.0971 21.0782 11.0316 21.2188 12 21.2188C17.2467 21.2188 21.5 17.0913 21.5 11.9998C21.5 10.3206 21.0374 8.74623 20.2291 7.39023" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
      </div>
      
      <div class="input-group py-4 flex justify-between space-x-4">
        <button type="button" class="w-full text-center p-4 rounded-lg bg-gray-300" onclick="prevStep()">กลับ</button>
        <button type="button" class="w-full text-center p-4 rounded-lg bg-slate-800 text-white" onclick="checkPictureAndNextStep()">ถัดไป</button>
      </div>
    </div>

    <div id="step3" class="hidden text-center">
      <div class="submit">
        <div class="w-full mb-4 rounded-lg bg-slate-800 text-white">
          <button type="button" onclick="getLocation()" class="w-full p-4 rounded-lg animate-pulse">
            กดเพื่อยืนยันที่อยู่ของคุณ
          </button>
        </div>
        <div id="locationInfo" class="bg-white p-4 rounded-lg shadow-sm max-w-sm mx-auto my-4 border border-pink-100">
          <div class="flex justify-between text-xs mb-2">
            <p id="latitude" class="text-gray-700 font-medium">Latitude: -</p>
            <p id="longitude" class="text-gray-700 font-medium">Longitude: -</p>
          </div>
          <p id="fullAddress" class="text-sm text-gray-600 cut-text">สถานที่: ยังไม่ได้ดึงข้อมูลพิกัด</p>
        </div>
        <input type="hidden" id="latitudeInput" name="latitudeInput" />
        <input type="hidden" id="longitudeInput" name="longitudeInput" />
        <input type="hidden" id="fullAddressInput" name="fullAddressInput" required />
      </div>
      
      <iframe id="mapIframe" class="p-2 rounded-lg shadow-md h-40 w-full" frameborder="0" style="border: 0" allowfullscreen=""></iframe>
      
      <div class="input-group my-4 py-4 flex justify-between">
        <button type="button" class="w-1/4 text-center p-4 m-2 rounded-lg bg-gray-300" onclick="prevStep()">กลับ</button>
        <button type="button" id="submitButton" class="w-3/4 text-center p-4 m-2 rounded-lg bg-gray-400 text-white cursor-not-allowed" onclick="submitForm()" disabled>
          บันทึกข้อมูล
        </button>
      </div>
    </div>
  </div>  

  <script src="Config.js"></script>
  <script>
    const Latitude = 16.808200;  // พิกัดเป้าหมาย
    const Longitude = 100.264197; // พิกัดเป้าหมาย
    const Range = 5000;          // ระยะรัศมี (เมตร)
    let currentStep = 1;

    window.onload = async function () {
      document.getElementById("jobInput").value = "เข้างาน";
      await initializeLiff();
    };

    async function initializeLiff() {
      try {
        await liff.init({ liffId: `${LIFF_ID}` });
        if (liff.isLoggedIn()) {
          getUserProfile();
        } else {
          liff.login();
        }
      } catch (error) {
        console.error("Error initializing LIFF:", error);
      }
    }

    async function getUserProfile() {
      try {
        const profile = await liff.getProfile();
        document.getElementById("userId").value = profile.userId;
        await fetchData(profile.userId);
      } catch (error) {
        console.error("Error getting profile data:", error);
      }
    }

    async function fetchData(userId) {
      showLoading(true);
      try {
        const response = await fetch(`${WEB_APP_MEMBER_URL}`, {
          method: "POST",
          body: JSON.stringify({ action: "fetchData", userId: userId }),
        });
        const data = await response.json();
        const userRows = data.filter((row) => row[1] === userId);
        if (userRows.length > 0) {
          userRows.sort((a, b) => new Date(b[6]) - new Date(a[6]));
          displayData(userRows[0]);
        }
      } catch (error) {
        console.error("Error fetching data:", error);
      } finally {
        showLoading(false);
      }
    }

    function displayData(row) {
      document.getElementById("columnAData").value = row[1] || "";
      document.getElementById("columnBData").value = row[2] || "";
      document.getElementById("columnCData").value = row[3] || "";
      document.getElementById("columnDData").value = row[4] || "";
      localStorage.setItem('savedName', row[2] || ""); 
      localStorage.setItem('savedId', row[3] || "");
    }

    function showLoading(isLoading) {
      const overlay = document.getElementById("loadingOverlay");
      const inputs = document.querySelectorAll("input, textarea, button");
      if (isLoading) {
        overlay.classList.remove("hidden");
        inputs.forEach((input) => (input.disabled = true));
      } else {
        overlay.classList.add("hidden");
        inputs.forEach((input) => (input.disabled = false));
      }
    }

    const url = `${WEB_APP_URL}`;
    const columnBData = document.querySelector("#columnBData");
    const columnCData = document.querySelector("#columnCData");
    const jobInput = document.querySelector("#jobInput");
    const noteInput = document.querySelector("#noteInput");
    const todayInput = document.querySelector("#todayInput");
    const currentTime = document.querySelector("#currentTime");
    const latitudeInput = document.querySelector("#latitudeInput");
    const longitudeInput = document.querySelector("#longitudeInput");
    const fullAddressInput = document.querySelector("#fullAddressInput");
    const userId = document.querySelector("#userId");
    const preview = document.getElementById("preview");

    document.addEventListener("DOMContentLoaded", function () {
      const video = document.getElementById("camera-preview");
      const startCameraBtn = document.getElementById("start-camera-btn");
      const captureBtn = document.getElementById("capture-btn");
      const switchCameraBtn = document.getElementById("switch-camera-btn");
      const previewImage = document.getElementById("preview");
      let stream;
      let currentFacingMode = "user";

      function startCamera() {
        navigator.mediaDevices
          .getUserMedia({ video: { facingMode: currentFacingMode } })
          .then(function (videoStream) {
            stream = videoStream;
            video.srcObject = videoStream;
            captureBtn.disabled = false;
            switchCameraBtn.disabled = false;
            video.classList.remove("hidden");
            previewImage.classList.add("hidden");
          })
          .catch(function (error) {
            console.error("Error accessing the camera: ", error);
            alert("ไม่สามารถเข้าถึงกล้องได้ กรุณาตรวจสอบการอนุญาตการเข้าถึงกล้องในแอปพลิเคชัน");
          });
      }

      function capturePhoto() {
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        previewImage.src = canvas.toDataURL("image/png");
        previewImage.classList.remove("hidden");
        video.classList.add("hidden");
      }

      function switchCamera() {
        if (stream) {
          stream.getTracks().forEach((track) => track.stop());
        }
        currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
        startCamera();
      }

      startCameraBtn.addEventListener("click", startCamera);
      captureBtn.addEventListener("click", capturePhoto);
      switchCameraBtn.addEventListener("click", switchCamera);
    } shutdownCamera);

    function checkPictureAndNextStep() {
      const capturedImage = document.getElementById("preview").src;
      const isHidden = document.getElementById("preview").classList.contains("hidden");
      
      if (isHidden || !capturedImage || capturedImage.includes("No-Image-Placeholder")) {
        Swal.fire({
          title: "แจ้งเตือน!",
          text: "กรุณาถ่ายรูปก่อนที่จะไปยังขั้นตอนถัดไป",
          icon: "warning",
          confirmButtonText: "OK",
        });
      } else {
        nextStep();
      }
    }

    function submitForm() {
      if (
        !columnBData.value ||
        !columnCData.value ||
        !jobInput.value ||
        !latitudeInput.value ||
        !longitudeInput.value
      ) {
        Swal.fire({
          title: "แจ้งเตือน!",
          text: "กรุณากรอกข้อมูลและยืนยันตำแหน่งให้ครบถ้วน",
          icon: "warning",
          confirmButtonText: "OK",
        });
        return;
      }
      
      Swal.fire({
        title: "ยืนยันการส่งข้อมูล",
        text: "คุณแน่ใจหรือไม่ที่ต้องการส่งข้อมูล?",
        icon: "question",
        showCancelButton: true,
        confirmButtonText: "ยืนยัน",
        cancelButtonText: "ยกเลิก",
      }).then((result) => {
        if (result.isConfirmed) {
          document.getElementById("submitButton").disabled = true;
          Swal.fire({
            title: "กำลังบันทึกข้อมูล",
            text: "กรุณารอสักครู่...",
            showConfirmButton: false,
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); },
          });

          let spt = preview.src.split("base64,")[1];
          let obj = {
            base64: spt,
            name: columnBData.value,
            role: columnCData.value,
            job: jobInput.value,
            note: noteInput.value,
            today: todayInput.value,
            time: currentTime.value,
            lat: latitudeInput.value,
            long: longitudeInput.value,
            address: fullAddressInput.value,
            user: userId.value,
          };

          fetch(url, { method: "POST", body: JSON.stringify(obj) })
            .then((response) => response.text())
            .then((data) => {
              Swal.close();
              Swal.fire({
                title: "สำเร็จ!",
                text: "บันทึกข้อมูลของคุณเรียบร้อย!",
                icon: "success",
                confirmButtonText: "ปิด",
              }).then(() => {
                sendFlexMessage();
              });
            })
            .catch((error) => {
              Swal.close();
              Swal.fire({
                title: "เกิดข้อผิดพลาด!",
                text: "ไม่สามารถส่งข้อมูลได้ กรุณาลองใหม่อีกครั้ง",
                icon: "error",
                confirmButtonText: "OK",
              }).then(() => {
                document.getElementById("submitButton").disabled = false;
              });
              console.error(error);
            });
        }
      });
    }

    async function sendFlexMessage() {
      let jobColor = "#0D9608FF";
      const flexMessage = {
        type: "flex",
        altText: "จดบันทึกเวลางาน",
        contents: {
          type: "bubble",
          direction: "ltr",
          body: {
            type: "box",
            layout: "vertical",
            spacing: "md",
            contents: [
              {
                type: "box",
                layout: "horizontal",
                contents: [
                  { type: "text", text: "บันทึกเวลาปฎิบัติงาน", weight: "bold", size: "md", align: "start", margin: "sm" },
                  { type: "text", text: `${jobInput.value}`, weight: "bold", size: "md", color: jobColor, align: "end" },
                ],
              },
              { type: "separator" },
              {
                type: "box",
                layout: "vertical",
                spacing: "sm",
                contents: [
                  {
                    type: "box",
                    layout: "baseline",
                    contents: [
                      { type: "text", text: "ชื่อ นสพ.", weight: "bold", size: "sm", margin: "sm" },
                      { type: "text", text: `${columnBData.value}`, size: "sm", color: "#000000FF", align: "end" },
                    ],
                  },
                  {
                    type: "box",
                    layout: "baseline",
                    contents: [
                      { type: "text", text: "รหัส นสพ.", weight: "bold", size: "sm", flex: 0, margin: "sm" },
                      { type: "text", text: `${columnCData.value}`, size: "sm", color: "#000000FF", align: "end" },
                    ],
                  },
                ],
              },
              { type: "separator" },
              {
                type: "box",
                layout: "vertical",
                contents: [
                  {
                    type: "box",
                    layout: "baseline",
                    contents: [
                      { type: "text", text: "วันที่", weight: "bold" },
                      { type: "text", text: `${todayInput.value}`, weight: "bold", align: "end" },
                    ],
                  },
                  {
                    type: "box",
                    layout: "baseline",
                    contents: [
                      { type: "text", text: "เวลา", weight: "bold" },
                      { type: "text", text: `${currentTime.value}`, weight: "bold", size: "xl", color: "#EF2F14FF", align: "end" },
                    ],
                  },
                ],
              },
              { type: "separator" },
              {
                type: "box",
                layout: "vertical",
                spacing: "xs",
                margin: "sm",
                contents: [
                  { type: "text", text: "สถานที่", weight: "bold", size: "sm", margin: "md" },
                  { type: "text", text: fullAddressInput.value ? `${fullAddressInput.value}` : "บันทึกพิกัดเรียบร้อย", wrap: true },
                ],
              },
            ],
          },
        },
      };
      try {
        await liff.sendMessages([flexMessage]);
      } catch (err) {
        console.error("Flex Message send failed:", err);
      } finally {
        liff.closeWindow();
      }
    }

    function updateDateTime() {
      const dateElement = document.getElementById("date");
      const timeElement = document.getElementById("time");
      const now = new Date();
      const dateOptions = { weekday: "long", year: "numeric", month: "long", day: "numeric" };
      const timeOptions = { hour: "numeric", minute: "numeric", second: "numeric", hour12: false, timeZone: "Asia/Bangkok" };
      
      dateElement.textContent = now.toLocaleDateString("th-TH", dateOptions);
      timeElement.textContent = now.toLocaleTimeString("en-US", timeOptions);
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();

    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const φ1 = (lat1 * Math.PI) / 180;
      const φ2 = (lat2 * Math.PI) / 180;
      const Δφ = ((lat2 - lat1) * Math.PI) / 180;
      const Δλ = ((lon2 - lon1) * Math.PI) / 180;
      const a =
        Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
        Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function getLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(displayLocation, showError);
      } else {
        Swal.fire("ไม่รองรับ", "บราวเซอร์ของคุณไม่รองรับ Geolocation", "error");
      }
    }

    function showError(error) {
      let message = "";
      switch (error.code) {
        case error.PERMISSION_DENIED: message = "คุณปฏิเสธการเข้าถึงตำแหน่งพิกัด"; break;
        case error.POSITION_UNAVAILABLE: message = "ไม่สามารถยืนยันตำแหน่งพิกัดได้"; break;
        case error.TIMEOUT: message = "หมดเวลาการค้นหาตำแหน่งพิกัด"; break;
        default: message = "เกิดข้อผิดพลาดที่ไม่รู้จัก"; break;
      }
      Swal.fire("เกิดข้อผิดพลาด", message, "error");
    }

    function displayLocation(position) {
      const latitude = position.coords.latitude;
      const longitude = position.coords.longitude;
      
      document.getElementById("latitude").innerText = `Latitude: ${latitude.toFixed(6)}`;
      document.getElementById("longitude").innerText = `Longitude: ${longitude.toFixed(6)}`;
      document.getElementById("latitudeInput").value = latitude;
      document.getElementById("longitudeInput").value = longitude;
      
      const submitButton = document.getElementById("submitButton");
      const distance = calculateDistance(latitude, longitude, Latitude, Longitude);
      
      if (distance > Range) {
        Swal.fire({
          icon: "error",
          title: "คุณอยู่นอกพื้นที่!",
          text: `ระยะห่างจากจุดที่กำหนด: ${distance.toFixed(0)} เมตร ไม่สามารถบันทึกข้อมูลได้`,
          confirmButtonText: "รับทราบ",
        });
        submitButton.disabled = true;
        submitButton.classList.add("bg-gray-400", "cursor-not-allowed");
        submitButton.classList.remove("bg-slate-800");
      } else {
        Swal.fire({
          icon: "success",
          title: "ตำแหน่งถูกต้อง!",
          text: `คุณอยู่ในพื้นที่ที่กำหนด (ระยะห่าง ${distance.toFixed(0)} เมตร)`,
          timer: 3000,
          showConfirmButton: false,
        });
        submitButton.disabled = false;
        submitButton.classList.remove("bg-gray-400", "cursor-not-allowed");
        submitButton.classList.add("bg-slate-800");
      }

      const reverseGeocodingUrl = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`;
      fetch(reverseGeocodingUrl)
        .then((response) => response.json())
        .then((data) => {
          document.getElementById("fullAddress").innerText = data.display_name ? `ที่อยู่: ${data.display_name}` : "ไม่สามารถดึงข้อมูลที่อยู่ได้";
          document.getElementById("fullAddressInput").value = data.display_name || "";
        });

      // แก้ไขส่วนแผนที่ Google Maps URL ให้รองรับพิกัดแบบ Embed ได้ถูกต้อง
      const mapsUrl = `https://maps.google.com/maps?q=${latitude},${longitude}&output=embed`;
      document.getElementById("mapIframe").src = mapsUrl;
    }

    function getCurrentTimeInBangkok() {
      const now = new Date();
      const bangkokTime = new Date(now.toLocaleString("en-US", { timeZone: "Asia/Bangkok" }));
      const hours = String(bangkokTime.getHours()).padStart(2, "0");
      const minutes = String(bangkokTime.getMinutes()).padStart(2, "0");
      return `${hours}:${minutes}`;
    }
    document.getElementById("currentTime").value = getCurrentTimeInBangkok();

    function getFormattedDate() {
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, "0");
      const day = String(today.getDate()).padStart(2, "0");
      return `${day}/${month}/${year}`;
    }
    document.getElementById("todayInput").value = getFormattedDate();

    function nextStep() {
      if (currentStep < 3) {
        document.getElementById(`step${currentStep}`).classList.add("hidden");
        currentStep++;
        document.getElementById(`step${currentStep}`).classList.remove("hidden");
      }
    }

    function prevStep() {
      if (currentStep > 1) {
        document.getElementById(`step${currentStep}`).classList.add("hidden");
        currentStep--;
        document.getElementById(`step${currentStep}`).classList.remove("hidden");
      }
    }
  </script>
</body>
</html>
