<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ประวัติการบันทึก</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
</head>
<body class="bg-white max-w-md mx-auto h-screen">
  <div class="container p-4">
    <div id="main-info" class="bg-slate-100 rounded p-6 mb-6 text-sm">
      <p>ชื่อ: <span id="name-info">-</span></p>
      <p>รหัส: <span id="employee-id-info">-</span></p>
    </div>
    <table class="min-w-full text-xs">
      <thead>
        <tr class="bg-slate-800 text-white"><th class="py-2">สถานะ</th><th class="py-2">หมายเหตุ</th><th class="py-2">วันที่เวลา</th></tr>
      </thead>
      <tbody id="data-table"></tbody>
    </table>
    <div id="loading" class="text-center mt-4">กำลังโหลดข้อมูล...</div>
  </div>

  <script src="Config.js"></script>
  <script>
    async function fetchData(userId) {
      document.getElementById('loading').style.display = 'block';
      try {
        // ใช้ fetch ปกติ แต่ต้องมั่นใจว่า App Script Deploy เป็น Anyone
        const response = await fetch(WEB_APP_URL);
        const data = await response.json();
        const filtered = data.filter(row => row[11] === userId);
        
        if (filtered.length > 0) {
          const last = filtered[filtered.length - 1];
          document.getElementById('name-info').textContent = last[2];
          document.getElementById('employee-id-info').textContent = last[3];
        }
        
        const table = document.getElementById('data-table');
        table.innerHTML = filtered.reverse().map(row => `
          <tr class="border-b text-center">
            <td class="py-2">${row[4]} (${row[12] || ''})</td>
            <td class="py-2">${row[5] || '-'}</td>
            <td class="py-2">${row[6]}<br>${row[7]}</td>
          </tr>
        `).join('');
      } catch (e) {
        document.getElementById('data-table').innerHTML = '<tr><td colspan="3">เกิดข้อผิดพลาดในการดึงข้อมูล</td></tr>';
        console.error(e);
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    liff.init({ liffId: LIFF_HISTORY }).then(() => {
      if (liff.isLoggedIn()) {
        liff.getProfile().then(p => fetchData(p.userId));
      } else {
        liff.login();
      }
    });
  </script>
</body>
</html>
